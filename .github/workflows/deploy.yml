name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login Docker
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # Create version
    - name: Set version
      run: echo "VERSION=v${{ github.run_number }}" >> $GITHUB_ENV

    # Build image
    - name: Build Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/streamlit-demo:${{ env.VERSION }} .

    # Push image
    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/streamlit-demo:${{ env.VERSION }}

    # Login Azure
    - name: Login Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Update Azure to NEW image
    - name: Update Azure Image
      run: |
        az webapp config container set \
        --name streamlit-demo-myewr \
        --resource-group streamlit-demo-rg \
        --docker-custom-image-name ${{ secrets.DOCKER_USERNAME }}/streamlit-demo:${{ env.VERSION }}

    # Restart Azure
    - name: Restart Azure
      run: az webapp restart --name streamlit-demo-myewr --resource-group streamlit-demo-rg